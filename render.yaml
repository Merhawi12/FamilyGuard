services:
  - type: web
    name: familyguard-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false          # set this to your Netlify URL after first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: familyguard-db
          property: connectionString

databases:
  - name: familyguard-db
    databaseName: familyguard
    user: familyguard
    plan: free
