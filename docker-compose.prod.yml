version: '3.8'

services:
  server:
    build: ./server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=sqlite
      - DB_PATH=/app/data/familyguard.sqlite
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PREMIUM_PRICE_ID=${STRIPE_PREMIUM_PRICE_ID}
      - STRIPE_FAMILY_PRICE_ID=${STRIPE_FAMILY_PRICE_ID}
    volumes:
      - sqlite_data:/app/data

  client:
    build: ./client
    restart: always
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  sqlite_data:
